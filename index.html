<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>致秦彻</title>
    <!-- 保持原有的样式和字体引用不变 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />
    <style>
        /* [保持你原有 CSS 不变] */
    </style>
</head>
<body>

    <div id="app">
        <!-- 阶段0: 开场视频 -->
        <div class="stage active video-stage" id="stage-video1">
            <div class="inner">
                <!-- 修改点：将 preload 改为 auto，默认 muted 以确保首屏自动播放成功 -->
                <video id="video1" playsinline controls preload="auto" muted>
                    <source src="./223.mov" type="video/mp4" />
                </video>
                <div class="video-fallback" id="fallback1">
                    <div class="icon">🎞️</div>
                    <p>开场视频未找到<br /><span class="sub">请将 223.mov 放在同目录下</span></p>
                </div>
                <p class="caption">点击屏幕任意位置开启声音</p>
                <button class="skip-btn" id="skip1">跳过 Skip</button>
            </div>
        </div>
        <!-- [其余 HTML 结构保持不变] -->
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const video1 = $('video1');

        /* 核心修改点：实现声音自动开启的交互逻辑 */
        function enableAudioOnInteraction() {
            // 只要用户在页面有任何点击，立即解除静音
            video1.muted = false;
            console.log("声音已自动开启");
            // 移除监听器，避免重复执行
            document.removeEventListener('click', enableAudioOnInteraction);
            document.removeEventListener('touchstart', enableAudioOnInteraction);
        }

        // 绑定交互监听
        document.addEventListener('click', enableAudioOnInteraction);
        document.addEventListener('touchstart', enableAudioOnInteraction);

        /* 视频结束处理 */
        video1.addEventListener('ended', () => {
            $('skip1').classList.add('action-ready');
            $('skip1').innerHTML = '继续前进 <span>→</span>';
        });

        // 原有的播放逻辑保持不变
        window.addEventListener('load', () => {
            video1.play().catch(e => console.log("等待交互后播放音频:", e));
        });

        // [此处保留你原有的 CONFIG 和后续所有逻辑代码]
        // ...
    </script>
</body>
</html>
